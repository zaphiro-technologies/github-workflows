name: License Management

concurrency:
  group: ${{github.repository}}-${{ github.ref_name }}-license
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_call:
    inputs:
      skip-dependency:
        required: false
        default: false
        type: boolean
        description: True to skip license dependency check
      skip-fix:
        required: false
        default: true
        type: boolean
        description: True to skip license header fix
      license-header-config-path:
        required: false
        default: ".github/config/.licenserc.yaml"
        type: string
        description: Path to the license-eye header configuration file.
      license-config-path:
        required: false
        default: ".github/config/.ort.yaml"
        type: string
        description: Path to the ORT repository configuration file in the scanned repository.
      ort-config-repository:
        required: false
        default: ""
        type: string
        description: ORT global configuration repository URL containing policy rules. If empty, uses zaphiro-technologies/github-workflows.
      ort-config-revision:
        required: false
        default: "license-workflow-fix-js-support"
        type: string
        description: Git revision / branch for the ORT global configuration repository.
      repositories:
        required: false
        type: string
        default: ""
        description: Comma or newline-separated list of repositories to grant access to during the golang build.
jobs:
  license:
    name: Check licenses
    runs-on: ubuntu-latest
    #if: ${{ github.event.pull_request.draft == false }}
    env:
      GOPRIVATE: github.com/zaphiro-technologies/*
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}
          repositories: ${{ github.event.repository.name }},github-workflows${{ inputs.repositories && format(',{0}', inputs.repositories) || '' }}
          permission-contents: write
          permission-workflows: write
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
      - name: Fix License Header
        if: ${{ ! inputs.skip-fix || inputs.skip-fix == '' }}
        uses: apache/skywalking-eyes/header@v0.8.0
        with:
          config: ${{ inputs.license-header-config-path || '.github/config/.licenserc.yaml' }}
          mode: fix
      - name: Apply Changes
        if: ${{ ! inputs.skip-fix || inputs.skip-fix == '' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: License Bot
          commit_user_email: bot@zaphiro.ch
          commit_message: "Automatic application of license header"
      - run: git config --global "url.https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/.insteadOf" "https://github.com/"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Ensure ORT repository configuration file exists
        shell: bash
        run: |
          cfg_path="${{ inputs.license-config-path || '.github/config/.ort.yaml' }}"

          if [[ -f "$cfg_path" ]]; then
            echo "Using ORT repository configuration from caller repository: $cfg_path"
            exit 0
          fi

          echo "ORT repository configuration '$cfg_path' not found in caller repository. Fetching fallback from github-workflows."
          mkdir -p "$(dirname "$cfg_path")"

          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${{ steps.generate-token.outputs.token }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/zaphiro-technologies/github-workflows/contents/$cfg_path?ref=${{ inputs.ort-config-revision || 'license-workflow-fix-js-support' }}" \
            --output "$cfg_path"

          echo "Downloaded fallback ORT repository configuration to: $cfg_path"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Check Dependencies' License (ORT)
        uses: oss-review-toolkit/ort-ci-github-action@v1.1.0
        with:
          fail-on: violations
          ort-yml-path: ${{ inputs.license-config-path || '.github/config/.ort.yaml' }}
          ort-config-repository: ${{ inputs.ort-config-repository || format('https://x-access-token:{0}@github.com/zaphiro-technologies/github-workflows.git', steps.generate-token.outputs.token) }}
          ort-config-revision: ${{ inputs.ort-config-revision || 'license-workflow-fix-js-support' }}
