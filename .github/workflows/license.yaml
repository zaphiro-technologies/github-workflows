name: License Management

concurrency:
  group: ${{github.repository}}-${{ github.ref_name }}-license
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_call:
    inputs:
      skip-dependency:
        required: false
        default: false
        type: boolean
        description: True to skip license dependency check
      skip-fix:
        required: false
        default: true
        type: boolean
        description: True to skip license header fix
      license-header-config-path:
        required: false
        default: ".github/config/.licenserc.yaml"
        type: string
        description: Path to the license-eye header configuration file.
      allowed-licenses:
        required: false
        default: "Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License"
        type: string
        description: Shared semicolon-separated allowlist used by Go, Node and Python checks.
      repositories:
        required: false
        type: string
        default: ""
        description: Comma or newline-separated list of repositories to grant access to during the golang build.
      comment-results:
        required: false
        default: true
        type: boolean
        description: True to add a PR comment with dependency license check results.
jobs:
  license:
    name: Check licenses
    runs-on: ubuntu-latest
    #if: ${{ github.event.pull_request.draft == false }}
    env:
      GOPRIVATE: github.com/zaphiro-technologies/*
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}
          repositories: ${{ github.event.repository.name }},github-workflows${{ inputs.repositories && format(',{0}', inputs.repositories) || '' }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
      - name: Fix License Header
        if: ${{ ! inputs.skip-fix || inputs.skip-fix == '' }}
        uses: apache/skywalking-eyes/header@v0.8.0
        with:
          config: ${{ inputs.license-header-config-path || '.github/config/.licenserc.yaml' }}
          mode: fix
      - name: Apply Changes
        if: ${{ ! inputs.skip-fix || inputs.skip-fix == '' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: License Bot
          commit_user_email: bot@zaphiro.ch
          commit_message: "Automatic application of license header"
      - run: git config --global "url.https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/.insteadOf" "https://github.com/"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Detect dependency ecosystems
        id: detect-ecosystems
        shell: bash
        run: |
          [[ -f "go.mod" ]] && echo "has-go=true" >> "$GITHUB_OUTPUT" || echo "has-go=false" >> "$GITHUB_OUTPUT"
          [[ -f "package.json" ]] && echo "has-node=true" >> "$GITHUB_OUTPUT" || echo "has-node=false" >> "$GITHUB_OUTPUT"
          [[ -f "requirements.txt" || -f "pyproject.toml" ]] && echo "has-python=true" >> "$GITHUB_OUTPUT" || echo "has-python=false" >> "$GITHUB_OUTPUT"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-go == 'true' }}
        name: Go license policy check
        id: go-license-check
        continue-on-error: true
        shell: bash
        run: |
          GO_ALLOWED_LICENSES="$(echo "${{ inputs.allowed-licenses || 'Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License' }}" | tr ';' ',')"
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/google/go-licenses/v2@latest
          "$RUNNER_TEMP/bin/go-licenses" check ./... --allowed_licenses="$GO_ALLOWED_LICENSES"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-node == 'true' }}
        name: Setup Node
        id: node-setup
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-node == 'true' }}
        name: Node license policy check
        id: node-license-check
        continue-on-error: true
        shell: bash
        run: |
          if [[ -f "yarn.lock" ]]; then
            corepack enable
            yarn install --immutable
          elif [[ -f "pnpm-lock.yaml" ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f "package-lock.json" || -f "npm-shrinkwrap.json" ]]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts --no-audit --no-fund
          fi
          npx --yes license-checker-rseidelsohn --production --onlyAllow "${{ inputs.allowed-licenses || 'Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License' }}"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-python == 'true' }}
        name: Setup Python
        id: python-setup
        continue-on-error: true
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-python == 'true' }}
        name: Python license policy check
        id: python-license-check
        continue-on-error: true
        shell: bash
        run: |
          python -m venv .license-venv
          . .license-venv/bin/activate
          python -m pip install --upgrade pip

          if [[ -f "requirements.txt" ]]; then
            python -m pip install -r requirements.txt
          elif [[ -f "pyproject.toml" && -f "poetry.lock" ]]; then
            python -m pip install poetry
            poetry export -f requirements.txt --without-hashes -o /tmp/license-requirements.txt
            python -m pip install -r /tmp/license-requirements.txt
          elif [[ -f "pyproject.toml" ]]; then
            echo "No requirements.txt or poetry.lock found. Installing local project metadata dependencies may be incomplete."
          fi

          python -m pip install pip-licenses
          pip-licenses --from=mixed --allow-only "${{ inputs.allowed-licenses || 'Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License' }}"
      - if: ${{ always() && (!inputs.skip-dependency || inputs.skip-dependency == '') && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Summarize dependency license results
        id: summarize-license-checks
        shell: bash
        run: |
          go_outcome="${{ steps.go-license-check.outcome || 'skipped' }}"
          node_setup_outcome="${{ steps.node-setup.outcome || 'skipped' }}"
          node_outcome="${{ steps.node-license-check.outcome || 'skipped' }}"
          python_setup_outcome="${{ steps.python-setup.outcome || 'skipped' }}"
          python_outcome="${{ steps.python-license-check.outcome || 'skipped' }}"

          failed=false
          [[ "$go_outcome" == "failure" ]] && failed=true
          [[ "$node_setup_outcome" == "failure" || "$node_outcome" == "failure" ]] && failed=true
          [[ "$python_setup_outcome" == "failure" || "$python_outcome" == "failure" ]] && failed=true

          echo "license-check-failed=$failed" >> "$GITHUB_OUTPUT"

          {
            echo "### Dependency License Checks"
            echo "- Go check: $go_outcome"
            echo "- Node setup/check: $node_setup_outcome / $node_outcome"
            echo "- Python setup/check: $python_setup_outcome / $python_outcome"
            echo "- Overall result: $([[ \"$failed\" == \"true\" ]] && echo failed || echo passed)"
          } >> "$GITHUB_STEP_SUMMARY"
      - if: ${{ always() && (!inputs.skip-dependency || inputs.skip-dependency == '') && github.event_name == 'pull_request' && inputs.comment-results && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Comment license results on PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const goOutcome = '${{ steps.go-license-check.outcome || 'skipped' }}';
            const nodeSetupOutcome = '${{ steps.node-setup.outcome || 'skipped' }}';
            const nodeOutcome = '${{ steps.node-license-check.outcome || 'skipped' }}';
            const pythonSetupOutcome = '${{ steps.python-setup.outcome || 'skipped' }}';
            const pythonOutcome = '${{ steps.python-license-check.outcome || 'skipped' }}';
            const failed = '${{ steps.summarize-license-checks.outputs.license-check-failed || 'false' }}' === 'true';

            const body = [
              '### Dependency License Checks',
              `- Go check: ${goOutcome}`,
              `- Node setup/check: ${nodeSetupOutcome} / ${nodeOutcome}`,
              `- Python setup/check: ${pythonSetupOutcome} / ${pythonOutcome}`,
              `- Overall result: ${failed ? 'failed' : 'passed'}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
      - if: ${{ always() && (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.summarize-license-checks.outputs.license-check-failed == 'true' && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Fail job on license policy violations
        run: |
          echo "One or more dependency license checks failed."
          exit 1
