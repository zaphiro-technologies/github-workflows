name: License Management

concurrency:
  group: ${{github.repository}}-${{ github.ref_name }}-license
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]
  workflow_call:
    inputs:
      skip-dependency:
        required: false
        default: false
        type: boolean
        description: True to skip license dependency check
      skip-fix:
        required: false
        default: true
        type: boolean
        description: True to skip license header fix
      license-header-config-path:
        required: false
        default: ".github/config/.licenserc.yaml"
        type: string
        description: Path to the license-eye header configuration file.
      allowed-licenses:
        required: false
        default: "Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License;Custom: https://gsap.com/standard-license;Python-2.0"
        type: string
        description: Shared semicolon-separated allowlist used by Go, Node and Python checks.
      repositories:
        required: false
        type: string
        default: ""
        description: Comma or newline-separated list of repositories to grant access to during the golang build.
      comment-results:
        required: false
        default: true
        type: boolean
        description: True to add a PR comment with dependency license check results.
jobs:
  license:
    name: Check licenses
    runs-on: ubuntu-latest
    #if: ${{ github.event.pull_request.draft == false }}
    env:
      GOPRIVATE: github.com/zaphiro-technologies/*
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}
          repositories: ${{ github.event.repository.name }},github-workflows${{ inputs.repositories && format(',{0}', inputs.repositories) || '' }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
      - name: Fix License Header
        if: ${{ ! inputs.skip-fix || inputs.skip-fix == '' }}
        uses: apache/skywalking-eyes/header@v0.8.0
        with:
          config: ${{ inputs.license-header-config-path || '.github/config/.licenserc.yaml' }}
          mode: fix
      - name: Apply Changes
        if: ${{ ! inputs.skip-fix || inputs.skip-fix == '' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: License Bot
          commit_user_email: bot@zaphiro.ch
          commit_message: "Automatic application of license header"
      - run: git config --global "url.https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/.insteadOf" "https://github.com/"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Detect dependency ecosystems
        id: detect-ecosystems
        shell: bash
        run: |
          [[ -f "go.mod" ]] && echo "has-go=true" >> "$GITHUB_OUTPUT" || echo "has-go=false" >> "$GITHUB_OUTPUT"
          [[ -f "package.json" ]] && echo "has-node=true" >> "$GITHUB_OUTPUT" || echo "has-node=false" >> "$GITHUB_OUTPUT"
          [[ -f "requirements.txt" || -f "pyproject.toml" ]] && echo "has-python=true" >> "$GITHUB_OUTPUT" || echo "has-python=false" >> "$GITHUB_OUTPUT"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-go == 'true' }}
        name: Setup Go
        id: go-setup
        continue-on-error: true
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-go == 'true' }}
        name: Go license policy check
        id: go-license-check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          set +e
          GO_ALLOWED_LICENSES="$(echo "${{ inputs.allowed-licenses || 'Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License;Python-2.0' }}" | tr ';' ',')"
          GO_LICENSE_LOG="$RUNNER_TEMP/go-license-check.log"
          : > "$GO_LICENSE_LOG"
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/google/go-licenses@v1.6.0

          status=0
          found_mod=false

          while IFS= read -r modfile; do
            found_mod=true
            moddir="$(dirname "$modfile")"
            echo "Checking Go module in: $moddir" | tee -a "$GO_LICENSE_LOG"

            module_path="$(cd "$moddir" && go list -m -f '{{.Path}}' 2>/dev/null || true)"
            check_target="./..."
            [[ -n "$module_path" ]] && check_target="${module_path}/..."

            ignore_args=(--ignore "github.com/zaphiro-technologies/")
            [[ -n "$module_path" ]] && ignore_args+=(--ignore "$module_path")
            module_log="$RUNNER_TEMP/go-license-$(echo "$moddir" | tr '/.' '__').log"

            (
              cd "$moddir"
              "$RUNNER_TEMP/bin/go-licenses" check "$check_target" --allowed_licenses="$GO_ALLOWED_LICENSES" "${ignore_args[@]}"
            ) 2>&1 | tee "$module_log" | tee -a "$GO_LICENSE_LOG"

            step_status=${PIPESTATUS[0]}
            if [[ $step_status -ne 0 ]]; then
              if awk '
                /Forbidden license type/ { found=1 }
                /Failed to find license for / {
                  if ($0 !~ /Failed to find license for github.com\/zaphiro-technologies\//) {
                    found=1
                  }
                }
                END { exit(found ? 0 : 1) }
              ' "$module_log"; then
                status=$step_status
              else
                echo "Ignoring non-actionable go-licenses loader errors for $moddir" | tee -a "$GO_LICENSE_LOG"
              fi
            fi
          done < <(find . -name go.mod -not -path '*/vendor/*' -not -path './.git/*' | sort)

          if [[ "$found_mod" == "false" ]]; then
            echo "No go.mod file found during Go license check." | tee -a "$GO_LICENSE_LOG"
            status=1
          fi

          echo "issues-file=$GO_LICENSE_LOG" >> "$GITHUB_OUTPUT"
          exit "$status"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-node == 'true' }}
        name: Setup Node
        id: node-setup
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-node == 'true' }}
        name: Node license policy check
        id: node-license-check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          set +e
          NODE_LICENSE_LOG="$RUNNER_TEMP/node-license-check.log"
          : > "$NODE_LICENSE_LOG"
          exec > >(tee -a "$NODE_LICENSE_LOG") 2>&1

          status=0

          if [[ -f "yarn.lock" ]]; then
            corepack enable
            yarn install --immutable
            install_status=$?
          elif [[ -f "pnpm-lock.yaml" ]]; then
            corepack enable
            pnpm install --frozen-lockfile
            install_status=$?
          elif [[ -f "package-lock.json" || -f "npm-shrinkwrap.json" ]]; then
            npm ci --ignore-scripts
            install_status=$?
          else
            npm install --ignore-scripts --no-audit --no-fund
            install_status=$?
          fi

          if [[ $install_status -ne 0 ]]; then
            echo "Dependency install failed with exit code $install_status"
            status=$install_status
          else
            npx --yes license-checker-rseidelsohn --production --onlyAllow "${{ inputs.allowed-licenses || 'Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License;Python-2.0' }}"
            checker_status=$?
            if [[ $checker_status -ne 0 ]]; then
              status=$checker_status
            fi
          fi

          echo "issues-file=$NODE_LICENSE_LOG" >> "$GITHUB_OUTPUT"
          exit "$status"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-python == 'true' }}
        name: Setup Python
        id: python-setup
        continue-on-error: true
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: ${{ (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.detect-ecosystems.outputs.has-python == 'true' }}
        name: Python license policy check
        id: python-license-check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          set +e
          PYTHON_LICENSE_LOG="$RUNNER_TEMP/python-license-check.log"
          : > "$PYTHON_LICENSE_LOG"
          exec > >(tee -a "$PYTHON_LICENSE_LOG") 2>&1

          status=0
          python -m venv .license-venv
          . .license-venv/bin/activate
          python -m pip install --upgrade pip

          if [[ -f "requirements.txt" ]]; then
            python -m pip install -r requirements.txt
            install_status=$?
            if [[ $install_status -ne 0 ]]; then
              echo "Dependency installation failed with exit code $install_status"
              status=$install_status
            fi
          elif [[ -f "pyproject.toml" && -f "poetry.lock" ]]; then
            python -m pip install poetry poetry-plugin-export
            poetry_install_status=$?
            if [[ $poetry_install_status -ne 0 ]]; then
              echo "Poetry setup failed with exit code $poetry_install_status"
              status=$poetry_install_status
            else
              poetry export -f requirements.txt --without-hashes -o /tmp/license-requirements.txt
              export_status=$?
              if [[ $export_status -ne 0 ]]; then
                echo "Poetry export failed with exit code $export_status"
                status=$export_status
              else
                python -m pip install -r /tmp/license-requirements.txt
                install_status=$?
                if [[ $install_status -ne 0 ]]; then
                  echo "Dependency installation failed with exit code $install_status"
                  status=$install_status
                fi
              fi
            fi
          elif [[ -f "pyproject.toml" ]]; then
            echo "No requirements.txt or poetry.lock found. Installing local project metadata dependencies may be incomplete."
          fi

          if [[ $status -eq 0 ]]; then
            python -m pip install pip-licenses
            pip_licenses_install_status=$?
            if [[ $pip_licenses_install_status -ne 0 ]]; then
              echo "pip-licenses installation failed with exit code $pip_licenses_install_status"
              status=$pip_licenses_install_status
            else
              pip-licenses --from=mixed --allow-only "${{ inputs.allowed-licenses || 'Apache-2.0;MIT;MIT OR X11;BSD;BSD License;BSD-2-Clause;BSD-3-Clause;ISC;ISC License;0BSD;MPL-2.0;Apache 2.0;Apache Software License;Python-2.0' }}"
              pip_licenses_status=$?
              if [[ $pip_licenses_status -ne 0 ]]; then
                status=$pip_licenses_status
              fi
            fi
          fi

          echo "issues-file=$PYTHON_LICENSE_LOG" >> "$GITHUB_OUTPUT"
          exit "$status"
      - if: ${{ always() && (!inputs.skip-dependency || inputs.skip-dependency == '') && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Summarize dependency license results
        id: summarize-license-checks
        shell: bash
        run: |
          go_outcome="${{ steps.go-license-check.outcome || 'skipped' }}"
          node_setup_outcome="${{ steps.node-setup.outcome || 'skipped' }}"
          node_outcome="${{ steps.node-license-check.outcome || 'skipped' }}"
          python_setup_outcome="${{ steps.python-setup.outcome || 'skipped' }}"
          python_outcome="${{ steps.python-license-check.outcome || 'skipped' }}"

          failed=false
          [[ "$go_outcome" == "failure" ]] && failed=true
          [[ "$node_setup_outcome" == "failure" || "$node_outcome" == "failure" ]] && failed=true
          [[ "$python_setup_outcome" == "failure" || "$python_outcome" == "failure" ]] && failed=true

          echo "license-check-failed=$failed" >> "$GITHUB_OUTPUT"
          issues_file="$RUNNER_TEMP/license-issues.md"
          : > "$issues_file"

          if [[ "$go_outcome" == "failure" ]]; then
            echo "#### Go" >> "$issues_file"
            if [[ -f "${{ steps.go-license-check.outputs.issues-file }}" ]]; then
              awk '
                /Forbidden license type/ {
                  if (match($0, /Forbidden license type ([^ ]+) for library ([^ ]+)/, m)) {
                    if (m[2] !~ /^github.com\/zaphiro-technologies\//) {
                      print "- " m[2] " -> forbidden license type " m[1]
                    }
                  }
                  next
                }
                /Failed to find license for / {
                  if (match($0, /Failed to find license for ([^:]+):/, m)) {
                    if (m[1] !~ /^github.com\/zaphiro-technologies\//) {
                      print "- " m[1] " -> license file not found"
                    }
                  }
                  next
                }
                /some errors occurred when loading direct and transitive dependency packages/ {
                  print "- go-licenses failed to load dependency graph"
                  next
                }
                /^F[0-9]{4} / {
                  # Fatal go-licenses messages can provide the root cause summary.
                  sub(/^F[0-9]{4} [0-9:.]+ +[0-9]+ [^]]+\] /, "", $0)
                  print "- " $0
                }
              ' "${{ steps.go-license-check.outputs.issues-file }}" | sort -u | head -n 80 >> "$issues_file" || true
            fi
            [[ ! -s "$issues_file" || "$(tail -n 1 "$issues_file")" == "#### Go" ]] && echo "- Go check failed. See job logs for details." >> "$issues_file"
            echo >> "$issues_file"
          fi

          if [[ "$node_setup_outcome" == "failure" || "$node_outcome" == "failure" ]]; then
            echo "#### Node" >> "$issues_file"
            if [[ "$node_setup_outcome" == "failure" ]]; then
              echo "- Node setup failed (runtime/tooling install)." >> "$issues_file"
            fi
            if [[ -f "${{ steps.node-license-check.outputs.issues-file }}" ]]; then
              awk '
                /^Package / && /not permitted/ {
                  # Quoted format: Package "pkg" is licensed under "MIT" which is not permitted by --onlyAllow
                  if (match($0, /^Package "([^"]+)" is licensed under "([^"]+)"/, m)) {
                    print "- " m[1] " -> " m[2]
                    next
                  }
                  # Unquoted format fallback: keep full line so details are not lost.
                  print "- " $0
                  next
                }
                /Dependency install failed with exit code/ || /npm ERR!/ || /ERR_PNPM_/ || /yarn .*error/ || /Command failed with exit code/ {
                  print "- " $0
                }
              ' "${{ steps.node-license-check.outputs.issues-file }}" | sort -u | head -n 80 >> "$issues_file" || true
            fi
            [[ "$(tail -n 1 "$issues_file")" == "#### Node" ]] && echo "- Node check failed. See job logs for details." >> "$issues_file"
            echo >> "$issues_file"
          fi

          if [[ "$python_setup_outcome" == "failure" || "$python_outcome" == "failure" ]]; then
            echo "#### Python" >> "$issues_file"
            if [[ "$python_setup_outcome" == "failure" ]]; then
              echo "- Python setup failed (runtime/tooling install)." >> "$issues_file"
            fi
            if [[ -f "${{ steps.python-license-check.outputs.issues-file }}" ]]; then
              awk '
                /Poetry export failed|The requested command export does not exist|Poetry setup failed|Dependency installation failed|pip-licenses installation failed/ {
                  line=$0
                  sub(/^\s+/, "", line)
                  print "- " line
                }
                /not allowed|not permitted|allow-only|fail-on/ {
                  line=$0
                  sub(/^\s+/, "", line)
                  print "- " line
                }
                /^\|/ {
                  # If tool prints tabular rows around failure, keep package rows for context.
                  line=$0
                  sub(/^\s+/, "", line)
                  print "- " line
                }
              ' "${{ steps.python-license-check.outputs.issues-file }}" | sort -u | head -n 80 >> "$issues_file" || true
            fi
            [[ "$(tail -n 1 "$issues_file")" == "#### Python" ]] && echo "- Python check failed. See job logs for details." >> "$issues_file"
            echo >> "$issues_file"
          fi

          if [[ "$failed" == "false" ]]; then
            echo "No dependency license issues found." > "$issues_file"
          fi

          {
            echo "issues-markdown<<EOF"
            cat "$issues_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Dependency License Issues"
            cat "$issues_file"
          } >> "$GITHUB_STEP_SUMMARY"
      - if: ${{ always() && (!inputs.skip-dependency || inputs.skip-dependency == '') && github.event_name == 'pull_request' && inputs.comment-results && steps.summarize-license-checks.outputs.license-check-failed == 'true' && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Comment license results on PR
        uses: actions/github-script@v8
        env:
          ISSUE_LIST: ${{ steps.summarize-license-checks.outputs.issues-markdown }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const body = ['### Dependency License Issues', process.env.ISSUE_LIST || '- Unable to extract issue details. See job logs.'].join('\n\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
      - if: ${{ always() && (!inputs.skip-dependency || inputs.skip-dependency == '') && steps.summarize-license-checks.outputs.license-check-failed == 'true' && (hashFiles('go.mod') != '' || hashFiles('package.json') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '') }}
        name: Fail job on license policy violations
        run: |
          echo "One or more dependency license checks failed."
          exit 1
