name: Container Deployment

concurrency:
  group: ${{inputs.environment}}-container-deployment
  cancel-in-progress: false

# Permissions needed
# permissions:
#   packages: read
#   pull-requests: read

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
        description: Application name used in k8s-deployments or corporate-apps repository
      ghcr-repository:
        required: false
        type: string
        default: ""
        description: GitHub container repository used to resolve the image digest
      parameter-prefix:
        required: false
        type: string
        default: image
        description: Helm parameter prefix used for corporate deployments
      environment:
        required: true
        type: string
        description: Environment name for the deployment

jobs:
  split-environment:
    name: Split environment
    runs-on: ubuntu-latest
    steps:
      - name: Split environment to cluster and platform
        id: split-environment
        run: |
          echo "cluster=$(echo ${{ inputs.environment }} | cut -d'|' -f1)" >> "$GITHUB_OUTPUT"
          echo "platform=$(echo ${{ inputs.environment }} | cut -d'|' -f2)" >> "$GITHUB_OUTPUT"
    outputs:
      cluster: ${{steps.split-environment.outputs.cluster}}
      platform: ${{steps.split-environment.outputs.platform}}
      is-corporate: ${{ steps.split-environment.outputs.cluster == 'corporate' && 'true' || 'false' }}
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: split-environment
    env:
      CLUSTER: ${{needs.split-environment.outputs.cluster}}
      IS_CORPORATE: ${{needs.split-environment.outputs.is-corporate}}
      PLATFORM: ${{needs.split-environment.outputs.platform}}
    environment:
      name: ${{inputs.environment}}
      url: ${{ needs.split-environment.outputs.is-corporate == 'true' && 'https://argocd.corporate.zaphiro.ch/applications' || format('https://argocd.{0}.zaphiro.ch/applications/argocd/platforms?view=tree&resource=kind%3AApplication', needs.split-environment.outputs.cluster) }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}
          repositories: ${{ needs.split-environment.outputs.is-corporate == 'true' && 'corporate-apps' || 'k8s-deployments' }}
          permission-contents: write
      - name: Get image tag from git tag
        if: github.ref_type == 'tag'
        run: |
          tag_version="$(echo ${{github.ref}} | cut -d'/' -f3)"
          echo "IMAGE_TAG=${tag_version#v}" >> $GITHUB_ENV
      - name: Get image tag from main branch
        if: github.ref_type == 'branch' && github.ref == 'refs/heads/main'
        run: |
          echo "IMAGE_TAG=main" >> $GITHUB_ENV
      - name: Search PR of branch not main
        if: github.ref_type == 'branch' && github.ref != 'refs/heads/main'
        id: search-pr
        uses: actions/github-script@v9
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        with:
          script: |
            const {BRANCH_NAME} = process.env
            const pr = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${BRANCH_NAME}`,
              state: 'open'
            });
            if (pr.data.length == 1) {
              return core.setOutput('pr', pr.data[0].number);
            }
            core.setFailed("PR not found");
      - name: Get image tag from PR number
        if: steps.search-pr.outputs.pr != ''
        run: |
          echo "IMAGE_TAG=pr-${{steps.search-pr.outputs.pr}}" >> $GITHUB_ENV
      - name: Checkout of k8s-deployments
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          repository: ${{ github.repository_owner }}/${{ needs.split-environment.outputs.is-corporate == 'true' && 'corporate-apps' || 'k8s-deployments' }}
          ref: main
      - name: Resolve image repository
        if: github.ref_type != 'tag'
        id: repository-name
        run: |
          repository="${{ inputs.ghcr-repository }}"

          if [ "${IS_CORPORATE}" = "true" ] && [ -z "$repository" ]; then
            echo "ghcr-repository is required for corporate deployments" >&2
            exit 1
          fi

          if [ -n "$repository" ]; then
            echo "repository=$repository" >> "$GITHUB_OUTPUT"
          elif [ "${{ env.PLATFORM }}" = "ALL" ]; then
            # pick the first cluster and first platform when ALL
              first_cluster=$(find kubernetes -maxdepth 1 -type d | tail -n 1 | xargs basename)
            first_platform=$(yq '.platforms | keys | .[0]' kubernetes/$first_cluster/values-platforms.yaml)
            repo=$(yq ".platforms.\"$first_platform\".${{inputs.app-name}}.image.repository" \
                  kubernetes/$first_cluster/values-platforms.yaml)
            echo "repository=$repo" >> "$GITHUB_OUTPUT"
          else
            echo "repository=$(yq '.platforms.${{env.PLATFORM}}.${{inputs.app-name}}.image.repository' kubernetes/${{env.CLUSTER}}/values-platforms.yaml)" >> "$GITHUB_OUTPUT"
          fi
      - name: Get digest for image tag if not git tag
        if: github.ref_type != 'tag'
        id: digest
        # Use github APIs to get the digest of the image tag
        uses: actions/github-script@v9
        with:
          script: |
            const {IMAGE_TAG} = process.env
            const repository_name = "${{steps.repository-name.outputs.repository}}"
            // Check IMAGE_TAG is not empty
            if (!IMAGE_TAG) {
              return core.setFailed("No valid tag found");
            }
            for await (const versions of github.paginate.iterator(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg, {
                package_type: "container",
                package_name: repository_name.split("/").pop(),
                org: "${{github.repository_owner}}",
                state: "active"
                })) {
              // Check if tag is in tags list
              for (const version of versions.data) {
                console.log(version)
                if (version.metadata.container.tags.includes(IMAGE_TAG)) {
                  return core.exportVariable('DIGEST', version.name);
                }
              }
            }
            core.setFailed("Image tag not found");
      - name: Concat digest to tag
        if: env.DIGEST != ''
        run: |
          echo "IMAGE_TAG=$IMAGE_TAG@$DIGEST" >> $GITHUB_ENV
      - name: Update values-platforms.yaml
        if: env.IS_CORPORATE != 'true' && env.PLATFORM != 'ALL'
        run: |
          # Build the yq path by splitting app-name on dots
          app_path=".platforms[\"${{ env.PLATFORM }}\"]"
          for part in $(echo "${{ inputs.app-name }}" | tr '.' '\n'); do
              app_path="${app_path}[\"$part\"]"
          done
          yq -i "$app_path.image.tag = \"${IMAGE_TAG}\"" \
            "kubernetes/${{ env.CLUSTER }}/values-platforms.yaml"
      - name: Update values-platforms.yaml (ALL)
        if: env.IS_CORPORATE != 'true' && env.PLATFORM == 'ALL'
        run: |
          for cluster in kubernetes/*; do
            echo "Processing cluster: $cluster"

            platforms=$(yq '.platforms | keys | .[]' "$cluster/values-platforms.yaml")
            for platform in $platforms; do
              echo "Updating platform: $platform"

              # Build the yq path by splitting app-name on dots
              app_path=".platforms[\"$platform\"]"
              for part in $(echo "${{ inputs.app-name }}" | tr '.' '\n'); do
                  app_path="${app_path}[\"$part\"]"
              done
              yq -i "$app_path.image.tag = \"${IMAGE_TAG}\"" \
                  "$cluster/values-platforms.yaml"
            done
          done
      - name: Update corporate application manifest
        if: env.IS_CORPORATE == 'true'
        env:
          PARAMETER_NAME: ${{ format('{0}.image.tag', inputs.parameter-prefix) }}
          TARGET_FILE: ${{ format('argocd/{0}.yaml', inputs.app-name) }}
        run: |
          if [ ! -f "$TARGET_FILE" ]; then
            echo "Corporate manifest $TARGET_FILE not found" >&2
            exit 1
          fi

          if ! yq -e '.spec.source.helm.parameters[]? | select(.name == strenv(PARAMETER_NAME))' "$TARGET_FILE" >/dev/null; then
            echo "Helm parameter $PARAMETER_NAME not found in $TARGET_FILE" >&2
            exit 1
          fi

          yq -i '(.spec.source.helm.parameters[] | select(.name == strenv(PARAMETER_NAME)).value) = strenv(IMAGE_TAG)' \
            "$TARGET_FILE"
      - name: Commit & Push changed tag
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Deploy tag ${{env.IMAGE_TAG}} to ${{github.repository}} on ${{inputs.environment}}"
          branch: main
          file_pattern: ${{ needs.split-environment.outputs.is-corporate == 'true' && format('argocd/{0}.yaml', inputs.app-name) || 'kubernetes/**/*.yaml' }}
